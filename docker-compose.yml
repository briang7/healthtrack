services:
  postgres:
    image: postgres:16-alpine
    container_name: healthtrack-postgres
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: healthtrack
      POSTGRES_PASSWORD: healthtrack_dev
      POSTGRES_DB: healthtrack_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthtrack -d healthtrack_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: healthtrack-redis
    ports:
      - "6381:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
